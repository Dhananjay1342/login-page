<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body{
    font-family: Arial;
    background: #f2f2f2;
}

.login-box{
    width: 300px;
    margin: 100px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    text-align: center;
}

input{
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}

button{
    width: 95%;
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>

<script>
function login(){
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if(user == "admin" && pass == "1234"){
        alert("Login Successful");
    }
    else{
        alert("Invalid Username or Password");
    }
}
</script>

</head>

<body>

<div class="login-box">
<h2>Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</body>
</html>
